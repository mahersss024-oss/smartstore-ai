name: Release

on:
  workflow_run:
    workflows: [CI]
    types:
      - completed
    branches:
      - main

jobs:
  release:
    strategy:
      matrix:
        node-version: [24.x]

    name: Create a new release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js environment
        uses: ./.github/actions/setup-project
        with:
          node-version: ${{ matrix.node-version }}

      - name: Verify the integrity of provenance attestations and registry signatures for installed dependencies
        run: npm audit signatures

      - name: Skip release when tag creation is disabled
        if: vars.ENABLE_SEMANTIC_RELEASE != 'true'
        run: |
          echo "Semantic release is disabled for this repository."
          echo "Set repository variable ENABLE_SEMANTIC_RELEASE=true and allow this workflow to create tags before enabling automated releases."

      - name: Release
        if: vars.ENABLE_SEMANTIC_RELEASE == 'true'
        run: npx --yes semantic-release@25.0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
