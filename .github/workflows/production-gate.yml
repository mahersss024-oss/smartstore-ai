name: Production Gate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AI_EMPLOYEE_WEBHOOK_SECRET: ci_ai_employee_webhook_secret_32_chars_min
      BROWSER_TO_TERMINAL_DISABLED: 'true'
      CLERK_SECRET_KEY: sk_test_ci_validation_key
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/postgres
      DEMO_MODE: 'true'
      MAINTENANCE_SECRET: ci_maintenance_secret_32_chars_minimum
      NEXT_PUBLIC_APP_URL: https://smartstore-ai.test
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_validation_key
      NEXT_PUBLIC_SENTRY_DISABLED: 'true'
      PLATFORM_ADMIN_USER_IDS: user_ci_admin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate production environment contract
        run: npm run check:env:production -- --demo

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit and component tests
        run: npm test

      - name: Production build
        run: npm run build-local
